# .github/workflows/release.yml
name: 自動打包並發布到 GitHub Release

# 觸發條件：當你推送 標籤（tag）時執行，例如 v1.0.0
on:
  push:
    tags:
      - 'v*'  # 只要 tag 開頭是 v，就自動執行（v1.0 / v2.1.3 都行）

jobs:
  build-and-release:
    name: 打包 + 發布
    runs-on: windows-latest  # 打包環境，使用 windows-latest 以支持 NSIS 安裝包
    permissions:
      contents: write  # 允許 Action 寫入權限建立 Release

    steps:
      # 1. 下載代碼
      - name: 取出程式碼
        uses: actions/checkout@v4

      # 2. 安裝執行環境（依你的語言調整）
      - name: 設定 Node.js（範例：前端/Node專案）
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. 安裝依賴 + 打包（這裡改成你的專案打包命令）
      - name: 安裝依賴並打包
        run: |
          npm install
          npm run build  # 你的打包指令

      # 4. 自動建立 GitHub Release 並上傳檔案
      - name: 發布到 Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/*.exe
            build/*.zip  # 要上傳的打包檔案（可多個）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}