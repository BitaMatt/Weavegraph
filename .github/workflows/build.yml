name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip build, only update version files'
        required: false
        default: 'false'

jobs:
  version-check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.package_version }}
      match: ${{ steps.check.outputs.match }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check version
        id: check
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "package_version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          if [ "$PACKAGE_VERSION" = "$TAG_VERSION" ]; then
            echo "match=true" >> $GITHUB_OUTPUT
            echo "Version match: $PACKAGE_VERSION"
          else
            echo "match=false" >> $GITHUB_OUTPUT
            echo "Version mismatch! package.json: $PACKAGE_VERSION, tag: $TAG_VERSION"
            exit 1
          fi

  build:
    needs: version-check
    runs-on: windows-latest
    if: needs.version-check.outputs.match == 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: weavegraph-installer
          path: |
            build/*.exe
            build/*.zip
          retention-days: 30

  release:
    needs: [version-check, build]
    runs-on: ubuntu-latest
    if: needs.version-check.outputs.match == 'true'
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: weavegraph-installer
          path: artifacts

      - name: Generate changelog
        id: changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "body=## Version $VERSION\n\n### Build Info\n- Build Date: $(date +'%Y-%m-%d')\n- Platform: Windows x64\n\n### Downloads\n- **Installer:** 人脈織圖(WeaveGraph)-${VERSION}-win64.exe\n- **Portable:** 人脈織圖(WeaveGraph)-${VERSION}-win64.zip" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*.exe
            artifacts/*.zip
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
