name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  version-check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.package_version }}
      match: ${{ steps.check.outputs.match }}
      is-tag: ${{ steps.check.outputs.is_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check version
        id: check
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "package_version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          
          # Check if this is a tag push
          IS_TAG=false
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            IS_TAG=true
            TAG_VERSION=${GITHUB_REF#refs/tags/v}
            echo "is_tag=true" >> $GITHUB_OUTPUT
            echo "Tag version: $TAG_VERSION"
            if [ "$PACKAGE_VERSION" = "$TAG_VERSION" ]; then
              echo "match=true" >> $GITHUB_OUTPUT
              echo "Version match: $PACKAGE_VERSION"
            else
              echo "match=false" >> $GITHUB_OUTPUT
              echo "Version mismatch! package.json: $PACKAGE_VERSION, tag: $TAG_VERSION"
              exit 1
            fi
          else
            echo "is_tag=false" >> $GITHUB_OUTPUT
            echo "match=true" >> $GITHUB_OUTPUT
            echo "Manual workflow dispatch - skipping version check"
          fi

  build:
    needs: version-check
    runs-on: windows-latest
    if: needs.version-check.outputs.match == 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.version-check.outputs.is_tag == 'true' && github.ref || 'master' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure npm mirrors
        run: |
          echo "electron_mirror=https://npmmirror.com/mirrors/electron/" > .npmrc
          echo "electron_builder_binaries_mirror=https://npmmirror.com/mirrors/electron-builder-binaries/" >> .npmrc
        shell: bash

      - name: Install dependencies
        run: npm install

      - name: Build Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: weavegraph-installer
          path: |
            build/*.exe
            build/*.zip
          retention-days: 30

  release:
    needs: [version-check, build]
    runs-on: ubuntu-latest
    if: needs.version-check.outputs.match == 'true' && needs.version-check.outputs.is_tag == 'true'
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: weavegraph-installer
          path: artifacts

      - name: Generate changelog
        id: changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "body=## Version $VERSION\n\n### Build Info\n- Build Date: $(date +'%Y-%m-%d')\n- Platform: Windows x64\n\n### Downloads\n- **Installer:** 人脈織圖(WeaveGraph)-${VERSION}-win64.exe\n- **Portable:** 人脈織圖(WeaveGraph)-${VERSION}-win64.zip" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*.exe
            artifacts/*.zip
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
