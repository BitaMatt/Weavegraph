name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  version-check:
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.check.outputs.package_version }}
      is_tag: ${{ steps.check.outputs.is_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check version
        id: check
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG_VERSION=${GITHUB_REF#refs/tags/v}
            echo "is_tag=true" >> "$GITHUB_OUTPUT"

            if [[ "$PACKAGE_VERSION" != "$TAG_VERSION" ]]; then
              echo "Version mismatch: package.json=$PACKAGE_VERSION, tag=$TAG_VERSION"
              exit 1
            fi
          else
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: version-check
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Configure npm mirrors
        shell: bash
        run: |
          echo "electron_mirror=https://npmmirror.com/mirrors/electron/" > .npmrc
          echo "electron_builder_binaries_mirror=https://npmmirror.com/mirrors/electron-builder-binaries/" >> .npmrc

      - name: Install dependencies
        run: npm install

      - name: Build Windows artifacts
        run: npm run build:win

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weavegraph-windows
          path: |
            build/*.exe
            build/*.zip
            build/latest.yml
            build/*.blockmap
          retention-days: 30

  release:
    needs: [version-check, build]
    runs-on: ubuntu-latest
    if: needs.version-check.outputs.is_tag == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: weavegraph-windows
          path: artifacts

      - name: Create release notes
        run: node scripts/generate-release-notes.js --version "${GITHUB_REF#refs/tags/v}" --output release-body.md
        shell: bash

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: release-body.md
          draft: false
          prerelease: false
          overwrite_files: true
          files: |
            artifacts/*.exe
            artifacts/*.zip
            artifacts/latest.yml
            artifacts/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
